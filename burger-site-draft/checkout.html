<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout — Burger Place</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/checkout.css">
</head>
<body>
  <header class="checkout-topbar">
    <div class="container checkout-topbar__inner">
      <a class="checkout-topbar__brand" href="menu.html">Burger.Place</a>
      <a class="checkout-topbar__back" href="menu.html">← Back to menu</a>
    </div>
  </header>
  <main class="checkout-shell">
    <aside class="checkout-summary" data-checkout-summary>
      <h2 class="checkout-summary__title">Your order</h2>
      <ul class="checkout-summary__lines" data-checkout-summary-lines></ul>
      <div class="checkout-summary__subtotal-row">
        <span>Subtotal</span>
        <span data-checkout-subtotal>$0.00</span>
      </div>
    </aside>
    <section class="checkout-form" data-checkout-form>
      <h2 class="checkout-form__title">Contact &amp; fulfillment</h2>
      <form class="checkout-form__el" id="checkout-form" novalidate>
        <div class="checkout-field">
          <label class="checkout-field__label" for="customer_name">Name</label>
          <input class="checkout-field__input" id="customer_name" name="customer_name" type="text" required maxlength="100" autocomplete="name" aria-describedby="customer_name_error" />
          <span class="checkout-field__error" id="customer_name_error"></span>
        </div>
        <div class="checkout-field">
          <label class="checkout-field__label" for="customer_email">Email</label>
          <input class="checkout-field__input" id="customer_email" name="customer_email" type="email" required autocomplete="email" aria-describedby="customer_email_error" />
          <span class="checkout-field__error" id="customer_email_error"></span>
        </div>
        <div class="checkout-field">
          <label class="checkout-field__label" for="customer_phone">Phone</label>
          <input class="checkout-field__input" id="customer_phone" name="customer_phone" type="tel" required autocomplete="tel" aria-describedby="customer_phone_error" />
          <span class="checkout-field__error" id="customer_phone_error"></span>
        </div>
        <fieldset class="checkout-form__radios">
          <legend>Fulfillment</legend>
          <div class="checkout-form__radio-group">
            <label class="checkout-form__radio-label"><input type="radio" name="fulfillment" value="pickup" checked />Pickup</label>
            <label class="checkout-form__radio-label"><input type="radio" name="fulfillment" value="deliver" />Deliver</label>
          </div>
        </fieldset>
        <label class="checkout-form__pickup-time" id="pickup_time_wrap">
          <span class="checkout-field__label">Pickup time</span>
          <input class="checkout-field__input" id="pickup_time" name="pickup_time" type="datetime-local" required aria-describedby="pickup_time_error" />
          <span class="checkout-field__error" id="pickup_time_error"></span>
        </label>
        <div class="checkout-form__submit-wrap">
          <button type="submit" class="btn btn--primary checkout-submit" id="checkout-submit" disabled>Place order</button>
        </div>
      </form>
      <div class="checkout-form__errors" id="checkout-form-errors" hidden aria-live="polite"></div>
    </section>
    <div class="checkout-empty" data-checkout-empty hidden>
      <div class="checkout-empty__icon">🛒</div>
      <h2 class="checkout-empty__title">Your cart is empty</h2>
      <p class="checkout-empty__body">Add some items from the menu before checking out.</p>
      <a class="btn btn--primary checkout-empty__cta" href="menu.html">Browse the menu</a>
    </div>
  </main>
  <script src="js/checkout.js"></script>
</body>
</html>
