<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout — Burger Place</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --color-primary: #b8312f; --color-primary-dark: #8c2523; --color-accent: #f4b942;
      --color-bg: #fff; --color-bg-soft: #f8f5f0; --color-ink: #1a1a1a;
      --color-ink-soft: #555; --color-muted: #8a8a8a; --color-line: #e6e1d8;
      --font-display: 'Poppins', system-ui, sans-serif; --font-body: 'Inter', system-ui, sans-serif;
      --radius-sm: 6px; --radius-md: 12px; --radius-lg: 20px;
      --shadow-sm: 0 2px 6px rgba(0,0,0,0.06); --shadow-md: 0 10px 30px rgba(0,0,0,0.10);
      --container: 1200px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font-body); color: var(--color-ink); background: var(--color-bg-soft); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; border: 0; background: none; }
    h1, h2, h3, h4 { font-family: var(--font-display); margin: 0 0 .5em; line-height: 1.15; }
    .container { width: 100%; max-width: var(--container); margin: 0 auto; padding: 0 24px; }
    .btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 22px; border-radius: 999px; font-family: var(--font-display); font-weight: 600; font-size: 14px; letter-spacing: 0.02em; transition: background 0.15s, color 0.15s; cursor: pointer; border: 0; }
    .btn--primary { background: var(--color-primary); color: #fff; }
    .btn--primary:hover { background: var(--color-primary-dark); }
    .btn--primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .checkout-topbar { position: sticky; top: 0; z-index: 50; background: var(--color-bg); border-bottom: 1px solid var(--color-line); height: 64px; display: flex; align-items: center; }
    .checkout-topbar__inner { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .checkout-topbar__brand { font-family: var(--font-display); font-weight: 800; font-size: 18px; color: var(--color-primary); }
    .checkout-topbar__back { font-size: 14px; font-weight: 500; color: var(--color-ink-soft); }
    .checkout-shell { max-width: 960px; margin: 0 auto; padding: 48px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
    @media (max-width: 760px) { .checkout-shell { grid-template-columns: 1fr; gap: 32px; padding: 24px 16px; } }
    .checkout-summary, .checkout-form { background: var(--color-bg); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-sm); }
    .checkout-summary__title, .checkout-form__title { font-size: 20px; margin-bottom: 20px; }
    .checkout-summary__lines { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 12px; }
    .checkout-summary__line { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--color-line); }
    .checkout-summary__line:last-child { border-bottom: none; }
    .checkout-summary__name { font-weight: 500; flex: 1; }
    .checkout-summary__qty { color: var(--color-muted); font-size: 14px; }
    .checkout-summary__price { font-weight: 600; white-space: nowrap; }
    .checkout-summary__subtotal-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 16px; border-top: 2px solid var(--color-ink); font-weight: 700; font-size: 18px; }
    .checkout-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .checkout-field__label { font-weight: 500; font-size: 14px; }
    .checkout-field__input { padding: 11px 14px; border: 1.5px solid var(--color-line); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 15px; color: var(--color-ink); background: var(--color-bg); transition: border-color 0.15s; width: 100%; }
    .checkout-field__input:focus { outline: none; border-color: var(--color-primary); }
    .checkout-field__input.is-invalid { border-color: var(--color-primary); background: #fff5f5; }
    .checkout-field__error { font-size: 13px; color: var(--color-primary); min-height: 18px; }
    .checkout-form__radios { border: none; padding: 0; margin: 0 0 20px; }
    .checkout-form__radios legend { font-weight: 500; font-size: 14px; margin-bottom: 10px; }
    .checkout-form__radio-group { display: flex; gap: 20px; }
    .checkout-form__radio-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 15px; }
    .checkout-form__pickup-time { display: none; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .checkout-form__pickup-time.is-visible { display: flex; }
    .checkout-form__submit-wrap { margin-top: 8px; }
    .checkout-submit { width: 100%; justify-content: center; padding: 14px 22px; font-size: 16px; }
    .checkout-form__errors { margin-top: 16px; padding: 12px 16px; background: #fff5f5; border: 1.5px solid var(--color-primary); border-radius: var(--radius-sm); color: var(--color-primary); font-size: 14px; min-height: 0; }
    .checkout-form__errors[hidden] { display: none; }
    .checkout-empty { text-align: center; padding: 80px 24px; }
    .checkout-empty__icon { font-size: 48px; margin-bottom: 16px; }
    .checkout-empty__title { font-size: 22px; margin-bottom: 12px; }
    .checkout-empty__body { color: var(--color-ink-soft); margin-bottom: 24px; }
    .checkout-empty__cta { display: inline-flex; }
    .checkout-success { text-align: center; padding: 60px 24px; }
    .checkout-success__title { font-size: 26px; margin-bottom: 16px; }
    .checkout-success__id { font-family: monospace; font-size: 15px; background: var(--color-bg-soft); padding: 6px 12px; border-radius: var(--radius-sm); display: inline-block; margin: 8px 0 24px; }
    .checkout-success__total { font-size: 20px; font-weight: 700; margin-bottom: 32px; }
    .checkout-success__back { display: inline-flex; }
    @media print { .checkout-form, .checkout-topbar, .checkout-form__errors { display: none !important; } .checkout-summary { box-shadow: none; } }
  </style>
</head>
<body>
  <header class="checkout-topbar">
    <div class="container checkout-topbar__inner">
      <a class="checkout-topbar__brand" href="menu.html">Burger.Place</a>
      <a class="checkout-topbar__back" href="menu.html">← Back to menu</a>
    </div>
  </header>
  <main class="checkout-shell">
    <aside class="checkout-summary" data-checkout-summary>
      <h2 class="checkout-summary__title">Your order</h2>
      <ul class="checkout-summary__lines" data-checkout-summary-lines></ul>
      <div class="checkout-summary__subtotal-row">
        <span>Subtotal</span>
        <span data-checkout-subtotal>$0.00</span>
      </div>
    </aside>
    <section class="checkout-form" data-checkout-form>
      <h2 class="checkout-form__title">Contact &amp; fulfillment</h2>
      <form class="checkout-form__el" id="checkout-form" novalidate>
        <div class="checkout-field">
          <label class="checkout-field__label" for="customer_name">Name</label>
          <input class="checkout-field__input" id="customer_name" name="customer_name" type="text" required maxlength="100" autocomplete="name" aria-describedby="customer_name_error" />
          <span class="checkout-field__error" id="customer_name_error"></span>
        </div>
        <div class="checkout-field">
          <label class="checkout-field__label" for="customer_email">Email</label>
          <input class="checkout-field__input" id="customer_email" name="customer_email" type="email" required autocomplete="email" aria-describedby="customer_email_error" />
          <span class="checkout-field__error" id="customer_email_error"></span>
        </div>
        <div class="checkout-field">
          <label class="checkout-field__label" for="customer_phone">Phone</label>
          <input class="checkout-field__input" id="customer_phone" name="customer_phone" type="tel" required autocomplete="tel" aria-describedby="customer_phone_error" />
          <span class="checkout-field__error" id="customer_phone_error"></span>
        </div>
        <fieldset class="checkout-form__radios">
          <legend>Fulfillment</legend>
          <div class="checkout-form__radio-group">
            <label class="checkout-form__radio-label"><input type="radio" name="fulfillment" value="pickup" checked />Pickup</label>
            <label class="checkout-form__radio-label"><input type="radio" name="fulfillment" value="deliver" />Deliver</label>
          </div>
        </fieldset>
        <label class="checkout-form__pickup-time" id="pickup_time_wrap">
          <span class="checkout-field__label">Pickup time</span>
          <input class="checkout-field__input" id="pickup_time" name="pickup_time" type="datetime-local" required aria-describedby="pickup_time_error" />
          <span class="checkout-field__error" id="pickup_time_error"></span>
        </label>
        <div class="checkout-form__submit-wrap">
          <button type="submit" class="btn btn--primary checkout-submit" id="checkout-submit" disabled>Place order</button>
        </div>
      </form>
      <div class="checkout-form__errors" id="checkout-form-errors" hidden aria-live="polite"></div>
    </section>
    <div class="checkout-empty" data-checkout-empty hidden>
      <div class="checkout-empty__icon">🛒</div>
      <h2 class="checkout-empty__title">Your cart is empty</h2>
      <p class="checkout-empty__body">Add some items from the menu before checking out.</p>
      <a class="btn btn--primary checkout-empty__cta" href="menu.html">Browse the menu</a>
    </div>
  </main>
  <script>
    /* ================================================================
       checkoutForm IIFE — validation, draft, idempotency, submit
       ================================================================ */
    (function () {
      'use strict';

      /* --- Idempotency token (per page-load) --- */
      window.__bpIdempotencyToken = (
        typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function'
          ? crypto.randomUUID()
          : (function () {
              var a = Array.from({ length: 16 }, function () { return Math.floor(Math.random() * 256); });
              a[6] = (a[6] & 0x0f) | 0x40; a[8] = (a[8] & 0x3f) | 0x80;
              var hex = Array.from(a).map(function (b) { return b.toString(16).padStart(2, '0'); });
              return hex.slice(0,4) + '-' + hex.slice(4,8) + '-' + hex.slice(8,12) + '-' + hex.slice(12,16) + '-' + hex.slice(16,32);
            })()
      );

      var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      var PHONE_RE = /^[+0-9\s\-()]{6,}$/;
      var MAX_NAME_LEN = 100;
      var CART_KEY = 'bp-cart-v1';
      var DRAFT_KEY = 'bp-checkout-draft';
      var SUCCESS_KEY = 'bp-checkout-success';
      var supabase = null;
      var submitting = false;

      /* --- formatPrice (DUPLICATED from menu.html) --- */
      var _fmt = (typeof Intl !== 'undefined' && Intl.NumberFormat)
        ? new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }) : null;
      function formatPrice(cents) {
        var n = Number(cents) | 0;
        if (_fmt) return _fmt.format(n / 100);
        var s = n < 0 ? '-' : ''; var a = Math.abs(n);
        return s + '$' + Math.floor(a / 100) + '.' + String(a % 100).padStart(2, '0');
      }

      /* --- Validation --- */
      function validate(field) {
        var val = (field.value || '').trim();
        if (field.name === 'customer_name') {
          if (!val) return 'Name is required';
          if (val.length > MAX_NAME_LEN) return 'Name must be 100 characters or fewer';
          return null;
        }
        if (field.name === 'customer_email') {
          if (!val) return 'Email is required';
          if (!EMAIL_RE.test(val)) return 'Enter a valid email address';
          return null;
        }
        if (field.name === 'customer_phone') {
          if (!val) return 'Phone is required';
          if (!PHONE_RE.test(val)) return 'Enter a valid phone number';
          return null;
        }
        if (field.name === 'pickup_time') {
          var ful = document.querySelector('input[name="fulfillment"]:checked');
          if (ful && ful.value === 'pickup') {
            if (!val) return 'Pickup time is required';
            var d = new Date(val);
            if (isNaN(d.getTime())) return 'Pickup time is required';
            if (d <= new Date()) return 'Pickup time must be in the future';
          }
          return null;
        }
        return null;
      }

      function setFieldError(field, msg) {
        var errEl = document.getElementById(field.id + '_error');
        if (errEl) errEl.textContent = msg || '';
        field.classList.toggle('is-invalid', !!msg);
      }

      function attachBlurValidation() {
        document.querySelectorAll('#checkout-form input').forEach(function (f) {
          f.addEventListener('blur', function () {
            setFieldError(f, validate(f));
            persistDraft();
          });
        });
      }

      function updateButtonState() {
        if (submitting) return;
        var allValid = true;
        document.querySelectorAll('#checkout-form input[name]').forEach(function (f) {
          if (f.type === 'radio') return;
          if (validate(f)) allValid = false;
        });
        var ful = document.querySelector('input[name="fulfillment"]:checked');
        if (!ful) allValid = false;
        document.getElementById('checkout-submit').disabled = !allValid;
      }

      function attachSubmitGuard() {
        document.querySelectorAll('#checkout-form input').forEach(function (f) {
          f.addEventListener('change', updateButtonState);
          f.addEventListener('input', updateButtonState);
        });
        document.getElementById('checkout-form').addEventListener('submit', function (e) {
          e.preventDefault();
          if (submitting) return;
          var firstErr = null;
          document.querySelectorAll('#checkout-form input[name]').forEach(function (f) {
            if (f.type === 'radio') return;
            var err = validate(f);
            setFieldError(f, err);
            if (err && !firstErr) firstErr = f;
          });
          if (firstErr) { firstErr.focus(); return; }
          submitting = true;
          document.getElementById('checkout-submit').disabled = true;
          submitOrder({
            customer_name: document.getElementById('customer_name').value.trim(),
            customer_email: document.getElementById('customer_email').value.trim(),
            customer_phone: document.getElementById('customer_phone').value.trim(),
            fulfillment: document.querySelector('input[name="fulfillment"]:checked').value,
            pickup_time: document.getElementById('pickup_time').value || null
          });
        });
      }

      /* --- Draft persistence --- */
      function persistDraft() {
        try {
          localStorage.setItem(DRAFT_KEY, JSON.stringify({
            customer_name: document.getElementById('customer_name').value,
            customer_email: document.getElementById('customer_email').value,
            customer_phone: document.getElementById('customer_phone').value,
            fulfillment: (document.querySelector('input[name="fulfillment"]:checked') || {}).value || 'pickup',
            pickup_time: document.getElementById('pickup_time').value
          }));
        } catch (ex) {}
      }

      function hydrateDraft() {
        try {
          var d = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
          if (d.customer_name) document.getElementById('customer_name').value = d.customer_name;
          if (d.customer_email) document.getElementById('customer_email').value = d.customer_email;
          if (d.customer_phone) document.getElementById('customer_phone').value = d.customer_phone;
          if (d.fulfillment) { var r = document.querySelector('input[name="fulfillment"][value="'+d.fulfillment+'"]'); if (r) r.checked = true; }
          if (d.pickup_time) document.getElementById('pickup_time').value = d.pickup_time;
        } catch (ex) {}
      }

      /* --- Submit + Supabase insert --- */
      function submitOrder(formData) {
        var raw = localStorage.getItem(CART_KEY);
        if (!raw) { redirectToMenu(); return; }
        var cart = null;
        try { cart = JSON.parse(raw); } catch (ex) { cart = null; }
        if (!cart || !Array.isArray(cart) || cart.length === 0) { redirectToMenu(); return; }

        var itemsPayload = cart.map(function (l) {
          var qty = Number(l.qty) || 1, price = Number(l.priceCents) || 0;
          return { catalog_id: String(l.id||''), name_snapshot: String(l.name||''), qty: qty,
            unit_price_cents: price, line_total_cents: qty * price };
        });
        var subtotal = itemsPayload.reduce(function (s, i) { return s + i.line_total_cents; }, 0);

        // NOTE: Do NOT add submit_token here — the column does not exist.
        // Client-side idempotency: window.__bpIdempotencyToken + submitting flag.
        var orderPayload = {
          customer_name: formData.customer_name, customer_email: formData.customer_email,
          customer_phone: formData.customer_phone, fulfillment: formData.fulfillment,
          pickup_time: formData.fulfillment === 'pickup' ? formData.pickup_time : null,
          subtotal_cents: subtotal, total_cents: subtotal
        };

        supabase.from('orders').insert(orderPayload).select().single()
          .then(function (res) {
            if (res.error) throw res.error;
            var order = res.data;
            var withOrderId = itemsPayload.map(function (i) { i.order_id = order.id; return i; });
            return supabase.from('order_items').insert(withOrderId)
              .then(function (ir) {
                if (ir.error) throw ir.error;
                try { localStorage.removeItem(CART_KEY); } catch (ex) {}
                try { localStorage.removeItem(DRAFT_KEY); } catch (ex) {}
                try { sessionStorage.setItem(SUCCESS_KEY, order.id); } catch (ex) {}
                window.location.href = 'menu.html#order=' + order.id;
              });
          })
          .catch(function (err) {
            var msg = 'We couldn\'t place your order. Check your connection and try again.';
            if (err && err.details && err.details.indexOf && err.details.indexOf('submit_token') !== -1) {
              msg = 'Server error: submit_token column not found — ensure migrations 001-003 are run in Supabase Studio.';
            }
            var errEl = document.getElementById('checkout-form-errors');
            if (errEl) { errEl.textContent = msg; errEl.hidden = false; }
            submitting = false;
            document.getElementById('checkout-submit').disabled = false;
          });
      }

      /* --- Cart summary rendering --- */
      function renderCartSummary() {
        var raw = null;
        try { raw = localStorage.getItem(CART_KEY); } catch (ex) {}
        var cart = null;
        try { cart = raw ? JSON.parse(raw) : null; } catch (ex) { cart = null; }
        var linesEl = document.querySelector('[data-checkout-summary-lines]');
        var subtotalEl = document.querySelector('[data-checkout-subtotal]');
        var summaryEl = document.querySelector('[data-checkout-summary]');
        var emptyEl = document.querySelector('[data-checkout-empty]');
        var formEl = document.querySelector('[data-checkout-form]');
        if (!cart || !Array.isArray(cart) || cart.length === 0) {
          if (linesEl) linesEl.innerHTML = '';
          if (subtotalEl) subtotalEl.textContent = '$0.00';
          if (summaryEl) summaryEl.hidden = true;
          if (emptyEl) emptyEl.hidden = false;
          if (formEl) formEl.hidden = true;
          return;
        }
        if (emptyEl) emptyEl.hidden = true;
        if (summaryEl) summaryEl.hidden = false;
        if (formEl) formEl.hidden = false;
        var subtotal = 0, html = '';
        cart.forEach(function (l) {
          var qty = Number(l.qty)||1, price = Number(l.priceCents)||0, line = qty * price;
          subtotal += line;
          html += '<li class="checkout-summary__line">' +
            '<span class="checkout-summary__name">'+l.name+'</span>' +
            '<span class="checkout-summary__qty"> ×'+qty+'</span>' +
            '<span class="checkout-summary__price">'+formatPrice(price)+'</span></li>';
        });
        if (linesEl) linesEl.innerHTML = html;
        if (subtotalEl) subtotalEl.textContent = formatPrice(subtotal);
      }

      function redirectToMenu() { window.location.href = 'menu.html'; }

      /* --- Init --- */
      function initCheckout() {
        var raw = null;
        try { raw = localStorage.getItem(CART_KEY); } catch (ex) {}
        var cart = null;
        try { cart = raw ? JSON.parse(raw) : null; } catch (ex) { cart = null; }
        if (!cart || !Array.isArray(cart) || cart.length === 0) { redirectToMenu(); return; }

        if (!window.supabase && window.__bpSupabase) {
          window.supabase = window.supabase.createClient(window.__bpSupabase.url, window.__bpSupabase.publishableKey,
            { auth: { persistSession: true, autoRefreshToken: true } });
        }
        supabase = window.supabase;

        attachBlurValidation();
        attachSubmitGuard();
        renderCartSummary();
        hydrateDraft();

        // Fulfillment radio → pickup-time visibility
        document.querySelectorAll('input[name="fulfillment"]').forEach(function (r) {
          r.addEventListener('change', function () {
            var wrap = document.getElementById('pickup_time_wrap');
            if (wrap) wrap.classList.toggle('is-visible', r.value === 'pickup');
          });
        });
        var checked = document.querySelector('input[name="fulfillment"]:checked');
        if (checked) {
          var wrap = document.getElementById('pickup_time_wrap');
          if (wrap) wrap.classList.toggle('is-visible', checked.value === 'pickup');
        }
      }

      window.addEventListener('storage', function (e) { if (e.key === CART_KEY) renderCartSummary(); });

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initCheckout);
      else initCheckout();
    })();

    /* ================================================================
       Slice 2 Manual Verification (customer checkout + cart bridge)
       PREREQUISITES:
         - Slice 1 is merged (PR #1 to main, commit 77b9e34)
         - Chef has manually pasted SQL migrations 001, 002, 003 into
           Supabase Studio SQL Editor (in numeric order)
         - supabase-config.js is filled with real .env values

       STEPS (run in a browser):
       1. Open menu.html — add 2 items to cart — click Checkout CTA →
          navigates to checkout.html with itemized summary visible.
       2. Submit with empty fields → inline "Name is required" etc. per field.
       3. Fill name "Juan", email "juan@test.com", phone "555-1234",
          pickup radio selected → pickup_time field appears.
       4. Set pickup_time to a future date/time. Submit → order placed.
       5. Redirected to menu.html, green confirmation banner visible with
          order id prefix (first 8 chars).
       6. Reload menu.html → banner is gone.
       7. Open checkout with empty cart → redirected to menu.html.
       8. Two-tab: tab A has checkout.html open with items; tab B add item to
          cart in menu.html → tab A summary re-renders (storage event).
       9. Submit with network offline → error toast shown, cart NOT cleared,
          draft pre-filled on retry.
      10. Double-click submit button → second request blocked while first
          is in-flight (submitting flag).
      ================================================================ */
  </script>
</body>
</html>
